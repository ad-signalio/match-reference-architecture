## this relies on the match-docker-secret existing in AWS Secrets Manager
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: match-redis-secret-provider-class
  namespace: match
spec:
  provider: aws                             
  parameters: 
    objects: |
        - objectName: "{{ .Values.redisSecretName }}"
          objectType: "secretsmanager"
          jmesPath:
          - path: "url"
            objectAlias: "url"
          - path: "elasticache_url"
            objectAlias: "elasticache_url"
          - path: "endpoint"
            objectAlias: "endpoint"
  secretObjects:
    - secretName: "{{ .Values.clusterName }}-redis"
      type: Opaque
      data:
        - key: url
          objectName: url
        - key: elasticache_url
          objectName: elasticache_url
        - key: endpoint
          objectName: endpoint