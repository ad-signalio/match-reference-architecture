apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: match-owning-user-credentials-secret-provider-class
  namespace: match
spec:
  provider: aws
  parameters:
    objects: |
        - objectName: "{{ .Values.userSecretName }}"
          objectType: "secretsmanager"
          jmesPath:
          - path: "password"
            objectAlias: "password"
          - path: "email"
            objectAlias: "email"
  secretObjects:
    - secretName: "match-owning-user-credentials"
      type: Opaque
      data:
        - key: password
          objectName: password
        - key: email
          objectName: email


