apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: match-api-secret-provider-class
  namespace: match
spec:
  provider: aws
  parameters:
    objects: |
        - objectName: "{{ .Values.apiSecretName }}"
          objectType: "secretsmanager"
          jmesPath:
          - path: "api_secret_key_base"
            objectAlias: "api_secret_key_base"
          - path: "secret_key_base"
            objectAlias: "secret_key_base"
          - path: "ingest_credential_encryption_key"
            objectAlias: "ingest_credential_encryption_key"
  secretObjects:
    - secretName: "match-api-secrets"
      type: Opaque
      data:
        - key: api_secret_key_base
          objectName: api_secret_key_base
        - key: secret_key_base
          objectName: secret_key_base
        - key: ingest_credential_encryption_key
          objectName: ingest_credential_encryption_key
